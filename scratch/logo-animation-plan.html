<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feinstecher - High-End Tattoo Workstations Hamburg</title>
    <meta name="description" content="Miete flexible High-End Workstations für Tattoo, PMU und Piercing im Herzen von Hamburg. Medizinischer Standard, modernes Atelier.">
    <!-- ... same head content ... -->
    <style>
        /* Preloader Styles */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #131313;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .logo-animation-container {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .logo-part {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: invert(1) brightness(2);
        }

        #logo-outline {
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInOutline 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        #logo-fill {
            opacity: 0;
            clip-path: inset(0 0 100% 0); /* Start hidden from top */
            animation: fillInterior 2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        @keyframes fadeInOutline {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fillInterior {
            0% {
                opacity: 1;
                clip-path: inset(0 0 100% 0);
            }
            100% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
        }

        #preloader.fade-out {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container">
    
    <!-- Preloader -->
    <div id="preloader">
        <div class="logo-animation-container">
            <img src="logo umranrandung.png" id="logo-outline" class="logo-part" alt="Logo Umrandung">
            <img src="feinstecherlogo innen.png" id="logo-fill" class="logo-part" alt="Logo Innen">
        </div>
    </div>

    <!-- Rest of the site ... -->
    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            // Wait for the animation to finish (at least 3 seconds total)
            setTimeout(() => {
                preloader.classList.add('fade-out');
            }, 3500);
        });
    </script>
</body>
</html>
